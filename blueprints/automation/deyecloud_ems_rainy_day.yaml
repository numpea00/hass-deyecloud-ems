blueprint:
  name: Deye Cloud EMS - Rainy Day
  description: Manually or on-trigger apply the rainy day TOU profile.
  domain: automation
  source_url: https://github.com/numpea00/hass-deyecloud-ems
  author: Deye Cloud EMS
  input:
    device_id:
      name: Deye inverter device
      selector:
        device:
          integration: deyecloud_ems
    trigger_input_boolean:
      name: Trigger input boolean
      selector:
        entity:
          domain: input_boolean

trigger:
  - platform: state
    entity_id: !input trigger_input_boolean
    to: "on"

action:
  - service: deyecloud_ems.apply_tou_profile
    data:
      device_id: !input device_id
      profile_name: thai_rainy
  - service: deyecloud_ems.set_work_mode
    data:
      device_id: !input device_id
      work_mode: ZERO_EXPORT_TO_LOAD
  - service: deyecloud_ems.set_energy_pattern
    data:
      device_id: !input device_id
      energy_pattern: BATTERY_FIRST

mode: single
