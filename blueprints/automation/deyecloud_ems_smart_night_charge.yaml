blueprint:
  name: Deye Cloud EMS - Smart Night Charge
  description: Apply TOU reserve from tomorrow forecast; does not enable grid charging.
  domain: automation
  source_url: https://github.com/numpea00/hass-deyecloud-ems
  author: Deye Cloud EMS
  input:
    device_id:
      name: Deye inverter device
      selector:
        device:
          integration: deyecloud_ems
    forecast_tomorrow_sensor:
      name: Solar forecast tomorrow (kWh)
      default: sensor.solcast_forecast_tomorrow
      selector:
        entity:
          domain: sensor
    battery_soc_sensor:
      name: Battery SOC sensor
      selector:
        entity:
          domain: sensor
          device_class: battery
    daily_consumption_kwh:
      name: Daily consumption estimate (kWh)
      default: 15
      selector:
        number:
          min: 1
          max: 100
          step: 0.5
    battery_capacity_kwh:
      name: Battery capacity (kWh)
      default: 10
      selector:
        number:
          min: 1
          max: 100
          step: 0.5

trigger:
  - platform: time
    at: "21:30:00"

action:
  - service: deyecloud_ems.smart_night_charge
    data:
      device_id: !input device_id
      forecast_kwh_tomorrow: "{{ states(!input forecast_tomorrow_sensor) | float(0) }}"
      daily_consumption_kwh: !input daily_consumption_kwh
      battery_capacity_kwh: !input battery_capacity_kwh
      current_soc: "{{ states(!input battery_soc_sensor) | float(50) }}"
      profile_name: thai_rainy

mode: single
