blueprint:
  name: Deye Cloud EMS - Solar Sell Window
  description: Enable solar sell during peak when SOC is high; disable when SOC is low.
  domain: automation
  source_url: https://github.com/num_p/hass-deyecloud-ems
  author: Deye Cloud EMS
  input:
    device_id:
      name: Deye inverter device
      selector:
        device:
          integration: deyecloud_ems
    battery_soc_sensor:
      name: Battery SOC sensor
      selector:
        entity:
          domain: sensor
          device_class: battery
    is_peak_sensor:
      name: Is Peak Now sensor
      selector:
        entity:
          domain: binary_sensor
    high_soc:
      name: Enable sell above SOC (%)
      default: 90
      selector:
        number:
          min: 70
          max: 100
          step: 1
    low_soc:
      name: Disable sell below SOC (%)
      default: 50
      selector:
        number:
          min: 10
          max: 80
          step: 1

trigger:
  - platform: state
    entity_id: !input battery_soc_sensor

action:
  - variables:
      soc: "{{ states(!input battery_soc_sensor) | float(0) }}"
      is_peak: "{{ is_state(!input is_peak_sensor, 'on') }}"
      high_soc: !input high_soc
      low_soc: !input low_soc
  - choose:
      - conditions:
          - condition: template
            value_template: "{{ is_peak and soc >= high_soc }}"
        sequence:
          - service: deyecloud_ems.set_solar_sell
            data:
              device_id: !input device_id
              enabled: true
      - conditions:
          - condition: template
            value_template: "{{ soc < low_soc }}"
        sequence:
          - service: deyecloud_ems.set_solar_sell
            data:
              device_id: !input device_id
              enabled: false

mode: single
